server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — catch-all
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE stream — must disable buffering or events never arrive
    location /leaderboard/stream {
        proxy_pass          http://api:8080/leaderboard/stream;
        proxy_http_version  1.1;
        proxy_set_header    Connection '';
        proxy_set_header    Host $host;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  3600s;
    }
}
